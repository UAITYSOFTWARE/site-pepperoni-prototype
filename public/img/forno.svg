<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <rect width="600" height="340" fill="#ffffff" rx="8"/>
  <!-- Brick oven -->
  <path d="M100 280 Q100 100 300 80 Q500 100 500 280 Z" fill="#c0392b" opacity="0.15"/>
  <path d="M120 280 Q120 120 300 100 Q480 120 480 280 Z" fill="#e74c3c" opacity="0.1"/>
  <!-- Oven opening -->
  <path d="M180 280 Q180 170 300 155 Q420 170 420 280 Z" fill="#1a1a1a" opacity="0.8"/>
  <!-- Fire glow -->
  <ellipse cx="300" cy="250" rx="80" ry="25" fill="#ff9800" opacity="0.4"/>
  <ellipse cx="300" cy="245" rx="50" ry="15" fill="#ff5722" opacity="0.3"/>
  <!-- Flames -->
  <ellipse cx="270" cy="240" rx="8" ry="22" fill="#ff9800" opacity="0.6"/>
  <ellipse cx="300" cy="235" rx="10" ry="28" fill="#ffc107" opacity="0.5"/>
  <ellipse cx="330" cy="240" rx="8" ry="22" fill="#ff9800" opacity="0.6"/>
  <!-- Pizza inside -->
  <ellipse cx="300" cy="260" rx="50" ry="12" fill="#f5e6c8" opacity="0.7"/>
  <text x="300" y="320" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#999">FORNO A LENHA</text>
</svg>
